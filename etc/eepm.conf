# Set some internal variables by default
# can be set with env var EPM_VERBOSE
#verbose=--verbose
#quiet=--quiet
#nodeps=--nodeps
#noremove=--no-remove
#dryrun=--dry-run
#force=--force
#repack=--repack
#inscript=1
#scripts=--scripts
#noscripts=--noscripts
#short=--short
#direct=--direct
#sort=<arg>
# can be set with env var EPM_AUTO
#non_interactive=--auto
#interactive=--interactive
#force_yes=--force-yes
#skip_installed=1
#skip_missed=1
#show_command_only=1
#epm_cmd=
# warmup repository data before using (actually only for HDD)
#warmup=1

# Fuzzy search suggestions (when package not found)
# Number of similar packages/apps to suggest (default: 7)
#suggest_count=7
# Enable interactive selection from suggestions (default: disabled)
#suggest_interactive=1

# Uncomment if you need skip some operations during full-upgrade
#full_upgrade_no_epm_play=1
#full_upgrade_no_flatpak=1
#full_upgrade_no_snap=1
#full_upgrade_no_stplr=1
#full_upgrade_no_update=1
#full_upgrade_no_upgrade=1
#full_upgrade_no_kernel_update=1
#full_upgrade_no_clean=1
#full_upgrade_no_atomic_image_update=1
#full_upgrade_no_epm_update_check=1

# autodetect by default
#eget_backend=curl
#eget_backend=wget

# enable IPFS for epm play
#ipfs=--ipfs

# own path for eget ipfs database
#eget_ipfs_db=/var/lib/eepm/eget-ipfs-db.txt


# valid backends' names:
# apt-rpm apt-dpkg aptitude-dpkg deepsolver-rpm urpm-rpm packagekit pkgsrc pkgng redox-pkg emerge pacman aura yum-rpm dnf-rpm snappy zypper-rpm mpkg eopkg conary npackd slackpkg homebrew opkg nix apk tce guix termux-pkg aptcyg xbps appget winget
#EPM_BACKEND=dnf5

# temp. place for unpacking
#BIGTMPDIR=/var/tmp

# Use local repository for package installation
# Packages will be added to local repo and installed from there
# Can be set with env var EPM_USE_LOCAL_REPO
#use_local_repo=1

# Security settings (allowed by default, set to 0 to forbid)
# Forbid epm repack --install (repack and install third-party packages)
#allow_repack_install=0
# Forbid installing packages not from official repository (thirdparty)
#allow_thirdparty_install=0

# Proxy settings (standard environment variables, exported for apt/dnf/wget/curl/eget)
# Note: apt uses http_proxy for both HTTP and HTTPS (https_proxy is ignored, see bug #38543)
#http_proxy=http://proxy.example.com:8080
#https_proxy=http://proxy.example.com:8080
#ftp_proxy=http://proxy.example.com:8080
#no_proxy=localhost,127.0.0.1,.local
